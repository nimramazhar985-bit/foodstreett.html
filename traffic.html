<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liberty Chowk Challan</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .danger-price {
      background-color: #f8d7da !important;
      border: 2px solid #dc3545 !important;
    }
  </style>
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-body">

      <h3 class="text-center mb-4">🚓 Challan Form - Liberty Chowk</h3>

      <form>

        <!-- Driver Name -->
        <div class="mb-3">
          <label class="form-label">Driver Name</label>
          <input type="text" class="form-control" placeholder="Enter driver name" required>
        </div>

        <!-- Vehicle Number -->
        <div class="mb-3">
          <label class="form-label">Vehicle Number</label>
          <input type="text" class="form-control" placeholder="Enter vehicle number" required>
        </div>

        <!-- Violation Type -->
        <div class="mb-3">
          <label class="form-label">Violation Type</label>
          <select class="form-select" id="violation">
            <option value="">Select violation</option>
            <option value="helmet">No Helmet</option>
            <option value="signal">Signal Break</option>
            <option value="wheel">One-Wheeling</option>
          </select>
        </div>

        <!-- Price with Rs -->
        <div class="mb-3">
          <label class="form-label">Price</label>
          <div class="input-group">
            <span class="input-group-text">Rs.</span>
            <input type="number" class="form-control" id="price" placeholder="Enter fine">
          </div>
        </div>

        <!-- Funny Disabled Button -->
        <button type="button" class="btn btn-danger w-100" disabled>
          Maafi De Dein Sir 😅
        </button>

      </form>

    </div>
  </div>
</div>

<!-- JS -->
<script>
  const violation = document.getElementById("violation");
  const price = document.getElementById("price");

  violation.addEventListener("change", function () {
    if (this.value === "wheel") {
      price.classList.add("danger-price");
    } else {
      price.classList.remove("danger-price");
    }
  });
</script>

</body>
</html>
