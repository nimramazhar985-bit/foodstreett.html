<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>You're Invited!</title>

  <style>
    body {
      background-color: pink;
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .invite {
      text-align: center;
      max-width: 500px;
      padding: 25px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    .details {
      text-align: left;
      margin-top: 15px;
    }

    ul {
      padding-left: 20px;
    }
  </style>

</head>

<body>

  <div class="invite">
    <h1>You're Invited!</h1>
    <p><strong>Hosted by: Nimra Mazhar</strong></p>

    <div class="details">
      <h2>Birthday Party</h2>
      <ul>
        <li>Event: Birthday Party</li>
        <li>Date: April 10, 2026</li>
        <li>Time: 6:30 PM</li>
        <li>Location: My Home</li>
      </ul>
    </div>

    <p>RSVP: nimra@example.com</p>
  </div>

</body>
</html>
