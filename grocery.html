!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ramadan Grocery List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4">Ramadan Grocery List</h1>

    <div class="mb-3">
      <div class="input-group">
        <input id="itemInput" type="text" class="form-control" placeholder="Type an item (e.g. Dates)" aria-label="Grocery item">
        <button id="addBtn" class="btn btn-primary" type="button">Add</button>
      </div>
      <div class="form-text">Type an item and click <strong>Add</strong> or press <kbd>Enter</kbd>.</div>
    </div>

    <ul id="list" class="list-group"></ul>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const input = document.getElementById('itemInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');

    function addItem() {
      const value = input.value.trim();
      if (!value) {
        input.focus();
        return;
      }

      const li = document.createElement('li');
      li.className = 'list-group-item d-flex justify-content-between align-items-center';

      const span = document.createElement('span');
      span.textContent = value;

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'btn btn-sm btn-outline-danger';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', () => list.removeChild(li));

      li.appendChild(span);
      li.appendChild(removeBtn);
      list.appendChild(li);

      input.value = '';
      input.focus();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addItem();
      }
    });
  </script>
</body>
</html>
