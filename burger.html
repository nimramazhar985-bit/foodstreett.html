!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fast-Food Checkout</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #e9ecef;
    }
    .receipt-card {
      max-width: 480px;
      width: 100%;
    }
    .bill-textarea {
      font-family: monospace;
      resize: none;
    }
  </style>
</head>

<body>

<div class="d-flex min-vh-100 align-items-center justify-content-center">
  <div class="receipt-card">
    <div class="card shadow">

      <div class="card-header bg-white">
        <h5>Fast-Food Checkout</h5>
      </div>

      <div class="card-body">

        <div class="mb-3">
          <label class="form-label">How many Zinger Burgers? (Rs. 500 each)</label>
          <input id="burgerInput" class="form-control" type="number">
        </div>

        <div class="mb-3">
          <label class="form-label">How many Fries? (Rs. 200 each)</label>
          <input id="friesInput" class="form-control" type="number">
        </div>

        <div id="errorMsg" class="mb-3"></div>

        <button id="calculateBtn" class="btn btn-primary w-100 mb-3">
          Calculate Total
        </button>

        <textarea id="billArea" class="form-control bill-textarea" rows="6" readonly></textarea>

      </div>

    </div>
  </div>
</div>

<script>
const burgerInput = document.getElementById("burgerInput");
const friesInput = document.getElementById("friesInput");
const calculateBtn = document.getElementById("calculateBtn");
const errorMsg = document.getElementById("errorMsg");
const billArea = document.getElementById("billArea");

calculateBtn.addEventListener("click", function () {

  errorMsg.innerHTML = "";
  billArea.value = "";

  let burgers = burgerInput.value;
  let fries = friesInput.value;

  if (burgers ==="" || fries === "") {
    errorMsg.innerHTML = '<div class="alert alert-danger">Please fill all fields</div>';
    return;
  }

  burgers = Number(burgers);
  fries = Number(fries);

  if (isNaN(burgers) || isNaN(fries)) {
    errorMsg.innerHTML = '<div class="alert alert-danger">Enter valid numbers</div>';
    return;
  }

  if (burgers < 0 || fries < 0) {
    errorMsg.innerHTML = '<div class="alert alert-danger">Negative values not allowed</div>';
    return;
  }

  if (!Number.isInteger(burgers) || !Number.isInteger(fries)) {
    errorMsg.innerHTML = '<div class="alert alert-danger">Only whole numbers allowed</div>';
    return;
  }

  let burgerTotal = burgers * 500;
  let friesTotal = fries * 200;
  let total = burgerTotal + friesTotal;

  // Receipt breakdown
  let receipt = "";
  receipt += "------ RECEIPT ------\n";
  receipt += "Zinger Burgers: " + burgers + " x 500 = Rs. " + burgerTotal + "\n";
  receipt += "Fries: " + fries + " x 200 = Rs. " + friesTotal + "\n";
  receipt += "----------------------\n";
  receipt += "TOTAL: Rs. " + total;

  billArea.value = receipt;

});
</script>

</body>
</html>
